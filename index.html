<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="cat-card">

  <div class="card-main">

    <!-- Left -->
    <aside class="profile">

      <div class="cat-badge">

        <svg class="cat-icon" viewBox="0 0 120 120">

          <!-- ears -->
          <polygon class="cat-fill" points="34,36 48,12 56,42"/>
          <polygon class="cat-fill" points="86,36 72,12 64,42"/>

          <!-- face -->
          <circle class="cat-fill" cx="60" cy="60" r="34"/>

          <!-- eyes -->
          <circle class="cat-eye" cx="48" cy="58" r="3"/>
          <circle class="cat-eye" cx="72" cy="58" r="3"/>

          <!-- nose -->
          <polygon class="cat-nose" points="60,66 56,70 64,70"/>

        </svg>

      </div>

      <div class="cat-name">
        くぅ
      </div>

      <div class="cat-subtitle">
        my precious floof
      </div>

    </aside>

    <!-- Right -->
    <section class="status">

      <div class="days-header">
        OUR DAYS
      </div>

      <div id="ourDays" class="days-number">
        --
      </div>

      <div class="days-unit">
        DAYS
      </div>

      <div class="divider"></div>

      <div class="info-list">

        <div class="info-row">
          <span>AGE</span>
          <strong id="age"></strong>
        </div>

        <div class="info-row">
          <span>BIRTHDAY</span>
          <strong>2018.05.15</strong>
        </div>

        <div class="info-row">
          <span>HOME DAY</span>
          <strong>2018.07.08</strong>
        </div>

        <div class="info-row">
          <span>NEXT BIRTHDAY</span>
          <strong id="nextBirthday"></strong>
        </div>

      </div>

    </section>

  </div>

  <footer class="footer">

    <div class="footer-en">
      Thank you for being here.
    </div>

    <div class="footer-jp">
      今日も一緒にいてくれてありがとう。
    </div>

  </footer>

</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
